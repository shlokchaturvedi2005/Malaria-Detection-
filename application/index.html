<!DOCTYPE html>
<html>
<head>
<title>Malaria Detection</title>
</head>

<body>

<h2>Upload Blood Cell Image</h2>

<form method="POST" enctype="multipart/form-data">
<input type="file" name="image">
<button type="submit">Predict</button>
</form>

{% if result %}
<h3>Prediction: {{result}}</h3>
{% endif %}

</body>
</html>
